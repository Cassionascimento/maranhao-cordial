<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel de Logística — Entrega</title>
    <style>
        body { font-family: sans-serif; background: #0f141c; color: #fff; padding: 20px; }
        .card { background: #1a2333; border-left: 5px solid #00b4d8; padding: 15px; margin-bottom: 15px; border-radius: 4px; }
        .entregue-btn { background: #00b4d8; color: #000; font-weight: bold; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; float: right; }
    </style>
</head>
<body>
    <h2>🚚 Rotas de Entrega Maranhão Guaraná</h2>
    <div id="lista-entrega"></div>

    <script>
        function atualizarEntrega() {
            const pedidos = JSON.parse(localStorage.getItem('pedidos_krikati')) || [];
            const container = document.getElementById('lista-entrega');
            container.innerHTML = pedidos.length === 0 ? '<p>Nenhuma entrega na fila no momento.</p>' : '';
            
            pedidos.forEach((p, index) => {
                container.innerHTML += `
                    <div class="card">
                        <button class="entregue-btn" onclick="arquivar(${index})">Saiu para Entrega</button>
                        <h3>${p.id} — Cliente: ${p.cliente}</h3>
                        <p>📍 <strong>Local de Entrega:</strong> ${p.endereco}</p>
                    </div>
                `;
            });
        }
        function arquivar(index) {
            let pedidos = JSON.parse(localStorage.getItem('pedidos_krikati')) || [];
            pedidos.splice(index, 1);
            localStorage.setItem('pedidos_krikati', JSON.stringify(pedidos));
            atualizarEntrega();
        }
        setInterval(atualizarEntrega, 3000);
        atualizarEntrega();
    </script>
</body>
</html>
